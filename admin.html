<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Betsaleel Docs</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-body">
  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-book-bookmark"></i></div>
        <div class="logo-text">Betsaleel<span>Docs</span></div>
      </div>
      <nav class="admin-nav">
        <a href="#" class="admin-link active"><i class="fa-solid fa-inbox"></i> Commandes</a>
        <a href="#" class="admin-link"><i class="fa-solid fa-plus"></i> Ajouter Doc</a>
        <a href="#" class="admin-link"><i class="fa-solid fa-chart-line"></i> Stats</a>
        <a href="index.html" class="admin-link"><i class="fa-solid fa-arrow-left"></i> Voir le site</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div id="login-section" class="login-container">
        <div class="login-card">
          <i class="fa-solid fa-lock"></i>
          <h2>Espace Admin Sécurisé</h2>
          <p>Entre ton mot de passe pour gérer les commandes</p>
          <input type="password" id="admin-pass" placeholder="Mot de passe admin">
          <button id="login-btn" class="btn btn-primary w-full">Connexion</button>
        </div>
      </div>

      <div id="admin-content" style="display:none;">
        <div class="admin-header">
          <h1>Tableau de bord</h1>
          <div class="admin-stats">
            <div class="stat-card">
              <i class="fa-solid fa-clock"></i>
              <div><span id="badge-count">0</span><p>En attente</p></div>
            </div>
          </div>
        </div>

        <section class="admin-section">
          <h2><i class="fa-solid fa-inbox"></i> Commandes en attente de validation</h2>
          <div id="commandes-list" class="commandes-grid"></div>
        </section>

        <section class="admin-section">
          <h2><i class="fa-solid fa-plus"></i> Publier un nouveau document</h2>
          <form id="form-ajout-doc" class="admin-form">
            <div class="form-grid">
              <input type="text" id="titre-doc" placeholder="Titre : Ex: Maths Tle D - Les Nombres Complexes" required>
              <textarea id="desc-doc" placeholder="Description courte du document" rows="3" required></textarea>
            </div>
            <div class="form-row">
              <select id="niveau-doc" required>
                <option value="">Niveau</option>
                <option>Seconde</option>
                <option>Premiere</option>
                <option>Terminale</option>
              </select>
              <input type="text" id="matiere-doc" placeholder="Matière : Maths, PC, SVT..." required>
              <input type="number" id="prix-doc" placeholder="Prix en FCFA" required>
            </div>
            <div class="form-row">
              <input type="text" id="drive-id-doc" placeholder="ID Google Drive du PDF" required>
              <input type="url" id="image-doc" placeholder="URL image de couverture (optionnel)">
            </div>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-upload"></i> Publier le document</button>
          </form>
        </section>
      </div>
    </main>
  </div>

  <style>
    .admin-body{background:var(--light-600);min-height:100vh}
    .admin-wrapper{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .admin-sidebar{background:var(--dark);color:white;padding:2rem 1.5rem}
    .admin-sidebar .logo{margin-bottom:3rem}
    .admin-nav{display:flex;flex-direction:column;gap:0.5rem}
    .admin-link{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:12px;color:var(--gray-300);text-decoration:none;transition:0.3s}
    .admin-link:hover,.admin-link.active{background:var(--primary);color:white}
    .admin-main{padding:2rem 3rem}
    .login-container{display:grid;place-items:center;height:100vh}
    .login-card{background:var(--light);padding:3rem;border-radius:var(--radius-lg);text-align:center;max-width:400px;box-shadow:var(--shadow-xl)}
    .login-card i{font-size:3rem;color:var(--primary);margin-bottom:1rem}
    .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem}
    .stat-card{display:flex;align-items:center;gap:1rem;background:var(--light);padding:1.5rem;border-radius:var(--radius);box-shadow:var(--shadow)}
    .stat-card i{width:50px;height:50px;background:var(--primary-100);color:var(--primary);border-radius:12px;display:grid;place-items:center;font-size:1.3rem}
    .stat-card span{font-size:2rem;font-weight:800;display:block}
    .admin-section{background:var(--light);padding:2rem;border-radius:var(--radius-lg);margin-bottom:2rem;box-shadow:var(--shadow)}
    .admin-section h2{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem}
    .commandes-grid{display:grid;gap:1.5rem}
    .commande-card{border:1px solid var(--light-600);border-radius:var(--radius);padding:1.5rem}
    .commande-header{display:flex;justify-content:space-between;margin-bottom:1rem}
    .commande-header span{font-size:0.9rem;color:var(--gray)}
    .badge{background:var(--danger);color:white;padding:0.3rem 0.8rem;border-radius:50px;font-weight:700}
    .commande-body p{display:flex;align-items:center;gap:0.75rem;margin:0.5rem 0;color:var(--dark-600)}
    .commande-body i{color:var(--primary);width:20px}
    .admin-form{display:flex;flex-direction:column;gap:1.5rem}
    .form-grid{display:grid;gap:1.5rem}.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem}
    @media(max-width:992px){.admin-wrapper{grid-template-columns:1fr}.admin-sidebar{display:none}}
  </style>
  <script type="module" src="app.js"></script>
</body>
</html>
